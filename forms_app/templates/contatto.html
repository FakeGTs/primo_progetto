{%extends 'base.html'%}
{% load crispy_forms_tags %}
{%block head_title%} {{block.super}} |Contattaci{% endblock head_title %}

{% block content %}
    <div class="container">
        <h1>Compila il form per contattarci, ti risponderemo al più presto!</h1>
        <form method="post">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="btn btn-danger">Invia</button>
        </form>
    </div>
{% endblock %}
